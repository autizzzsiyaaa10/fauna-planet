<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fauna Planet</title>
    <style>
        :root {
            --bg-color: #fcf8f2;
            --header-bg: linear-gradient(135deg, #ffd3b6, #ffaaa5, #dcedc1);
            --text-main: #4a3f35;
            --text-sub: #7a6e67;
            --search-bg: #ffffff;
            --modal-overlay: rgba(74, 63, 53, 0.4);
            --pastel-pink: #ffebef;
            --pastel-blue: #e3f2fd;
            --pastel-green: #e8f5e9;
            --pastel-purple: #f3e5f5;
            --pastel-yellow: #fffde7;
            --pastel-orange: #fff3e0;
        }

        [data-theme="dark"] {
            --bg-color: #2d242e;
            --header-bg: linear-gradient(135deg, #4831d4, #cc5a71, #f9a826);
            --text-main: #fcf8f2;
            --text-sub: #d1c7bd;
            --search-bg: #3d313e;
            --pastel-pink: #4a343c;
            --pastel-blue: #2c3e50;
            --pastel-green: #27382b;
            --pastel-purple: #3d2c3e;
            --pastel-yellow: #46442b;
            --pastel-orange: #46372b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            font-family: "Comic Sans MS", "Chalkboard SE", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            background: var(--header-bg);
            color: #4a3f35;
            text-align: center;
            padding: 60px 20px;
            border-bottom: 8px dashed #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] header {
            color: #ffffff;
            border-bottom: 8px dashed #3d313e;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px #ffffff;
        }
        [data-theme="dark"] header h1 {
            text-shadow: 2px 2px 0px #2d242e;
        }

        header p {
            font-size: 1.2rem;
            font-style: italic;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        #search-bar {
            padding: 12px 25px;
            width: 100%;
            max-width: 450px;
            border-radius: 30px;
            border: 3px solid #ffffff;
            outline: none;
            font-size: 1.1rem;
            background-color: var(--search-bg);
            color: var(--text-main);
            box-shadow: 0 6px 0px rgba(0,0,0,0.05);
        }

        .btn-theme {
            background: #ffffff;
            border: 3px solid #4a3f35;
            color: #4a3f35;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 4px 0px #4a3f35;
        }

        .btn-theme:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 0px #4a3f35;
        }

        .btn-theme:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0px #4a3f35;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 35px;
        }

        .card {
            background: #ffffff;
            border: 4px solid var(--text-main);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 0px var(--text-main);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card.c-pink { background-color: var(--pastel-pink); }
        .card.c-blue { background-color: var(--pastel-blue); }
        .card.c-green { background-color: var(--pastel-green); }
        .card.c-purple { background-color: var(--pastel-purple); }
        .card.c-yellow { background-color: var(--pastel-yellow); }
        .card.c-orange { background-color: var(--pastel-orange); }

        .card:hover {
            transform: translateY(-8px) rotate(1deg);
            box-shadow: 0 16px 0px var(--text-main);
        }

        .card-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 4px solid var(--text-main);
        }

        .card-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .badge {
            align-self: flex-start;
            background: #ffffff;
            color: #4a3f35;
            border: 2px solid #4a3f35;
            padding: 4px 14px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 12px;
            text-transform: uppercase;
            box-shadow: 2px 2px 0px #4a3f35;
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .card p {
            color: var(--text-sub);
            font-size: 0.95rem;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #ffffff;
            border: 5px solid #4a3f35;
            padding: 35px;
            border-radius: 32px;
            max-width: 550px;
            width: 100%;
            position: relative;
            box-shadow: 0 15px 0px #4a3f35;
            transform: scale(0.7) rotate(-2deg);
        }

        .modal.active .modal-content {
            transform: scale(1) rotate(0deg);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2.2rem;
            background: none;
            border: none;
            color: #4a3f35;
            cursor: pointer;
        }
        .close-btn:hover {
            transform: scale(1.2);
        }

        .modal h2 {
            margin-top: 10px;
            margin-bottom: 15px;
            font-size: 2.2rem;
        }

        #modal-desc {
            margin-bottom: 20px;
            font-size: 1.05rem;
        }

        .modal-fact-box {
            background: #fffde7;
            border: 3px dashed #4a3f35;
            padding: 20px;
            margin-top: 20px;
            border-radius: 18px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.05);
            position: relative;
        }
        
        .modal-fact-box strong {
            display: block;
            font-size: 1.1rem;
            color: #b15b00;
            margin-bottom: 6px;
        }

        .modal-fact-box p {
            font-style: italic;
            font-size: 0.95rem;
            color: #4a3f35;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌸 FAUNA PLANET 🌸</h1>
        <p>✨ Step into a magical world of wonderful creatures! ✨</p>
        <div class="controls">
            <input type="text" id="search-bar" placeholder="Search your favorite animals..." onkeyup="filterAnimals()">
            <button class="btn-theme" onclick="toggleTheme()">🌓 Change Skyline</button>
        </div>
    </header>

    <div class="container">
        <div class="grid" id="animal-grid">
            
            <div class="card c-pink" onclick="openModal('Axolotl', 'Amphibian', 'Known as the Mexican walking fish, this smiling water dragon retains its cute feathery gills and larval features its whole life long!', 'Axolotls are real-life superheroes! They can regrow whole limbs, pieces of their spinal cord, eyes, and even parts of their brain perfectly.')">
                <img src="https://images.unsplash.com/photo-1571752726703-5e74ac8691b6?w=500" alt="Axolotl" class="card-img">
                <div class="card-content">
                    <span class="badge">Amphibian</span>
                    <h2>Axolotl</h2>
                    <p>A bubbly little water dragon with legendary healing capabilities.</p>
                </div>
            </div>

            <div class="card c-blue" onclick="openModal('Snow Leopard', 'Mammal', 'The elusive ghost of the freezing mountains. These big beautiful cats wander around the highest peaks of Central Asia.', 'Snow leopards cannot roar at all!
